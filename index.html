<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>2048</h1>
      <div class="scores">
        <div class="score-box">
          <span class="label">SCORE</span>
          <span id="score">0</span>
        </div>
        <div class="score-box">
          <span class="label">BEST</span>
          <span id="best">0</span>
        </div>
      </div>
    </div>
    <div class="intro">
      <p class="tagline">Join the tiles, get to <b>2048!</b></p>
      <div class="controls">
        <button id="lucky-toggle" class="btn lucky" aria-pressed="false" title="Toggle Lucky Mode (L)">🍀 Lucky: OFF</button>
        <button id="regen-btn" class="btn" title="Re-roll the last generated tile (U)" disabled>🔄 Regenerate</button>
        <button id="new-game" class="btn">New Game</button>
      </div>
    </div>
    <div class="board" id="board"></div>
    <p class="hint">Use <b>arrow keys</b> or <b>swipe</b> to move. Press <b>R</b> to restart, <b>U</b> to regenerate.</p>
  </div>
  <script src="game.js"></script>
</body>
</html>
